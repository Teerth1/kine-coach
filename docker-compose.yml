version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/mock_db.json:/app/mock_db.json

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
