version: '3.8'

services:
  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./backend/mock_db.json:/app/mock_db.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - kine-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kine-network

networks:
  kine-network:
    driver: bridge

